<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanh Nguyên ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at center,#0d0d2b 0%,#000 80%);
color:white;
}

/* LOCK SCREEN */
#lock{
position:absolute;
width:100%;height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
transition:1s;
}

input{
padding:12px;
border-radius:25px;
border:none;
margin-top:15px;
text-align:center;
width:200px;
}

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff2d95;
color:white;
cursor:pointer;
margin-top:15px;
box-shadow:0 0 20px #ff2d95;
}

/* STARS */
.star{
position:absolute;
width:2px;height:2px;
background:white;
border-radius:50%;
animation:twinkle 3s infinite alternate;
}
@keyframes twinkle{
from{opacity:.3}
to{opacity:1}
}

/* HEART FLOAT */
.heart{
position:absolute;
font-size:20px;
animation:float 8s linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh);opacity:0}
10%{opacity:1}
90%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

/* FLOWER PETAL */
.petal{
position:absolute;
font-size:18px;
animation:fall 10s linear infinite;
opacity:.8;
}
@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg)}
100%{transform:translateY(110vh) rotate(360deg)}
}

/* MAIN NAME */
#name{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(.7);
font-size:55px;
text-align:center;
opacity:0;
text-shadow:0 0 15px #ff4da6,0 0 35px #ff1a8c;
transition:2s ease;
}

/* EXPLOSION */
.explosion{
position:absolute;
font-size:25px;
animation:explode 1s forwards;
}
@keyframes explode{
to{
transform:translate(var(--x),var(--y));
opacity:0;
}
}

/* RIPPLE */
.ripple{
position:absolute;
border:2px solid #ff4da6;
border-radius:50%;
animation:ripple 1s ease-out forwards;
}
@keyframes ripple{
to{
transform:scale(5);
opacity:0;
}
}
</style>
</head>
<body>

<div id="lock">
<h2>Nhập mật khẩu 💖</h2>
<input type="password" id="pass" placeholder="••••••">
<button onclick="openUniverse()">Mở Vũ Trụ</button>
</div>

<div id="name">
Thanh Nguyên ❤️<br>02/02/2008
</div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

const PASSWORD="1112023";

function openUniverse(){
if(document.getElementById("pass").value!==PASSWORD){
alert("Sai mật khẩu 😝");
return;
}

document.getElementById("lock").style.opacity="0";
setTimeout(()=>{document.getElementById("lock").style.display="none"},1000);

document.getElementById("music").play();
createStars();
createHearts();
createPetals();

setTimeout(()=>{
let n=document.getElementById("name");
n.style.opacity="1";
n.style.transform="translate(-50%,-50%) scale(1)";
explode(window.innerWidth/2,window.innerHeight/2);
},5000);
}

/* STARS */
function createStars(){
for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="star";
s.style.top=Math.random()*window.innerHeight+"px";
s.style.left=Math.random()*window.innerWidth+"px";
document.body.appendChild(s);
}
}

/* HEARTS */
function createHearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*window.innerWidth+"px";
h.style.animationDuration=(6+Math.random()*4)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),10000);
},900);
}

/* PETALS */
function createPetals(){
setInterval(()=>{
let p=document.createElement("div");
p.className="petal";
p.innerHTML="🌸";
p.style.left=Math.random()*window.innerWidth+"px";
p.style.animationDuration=(8+Math.random()*5)+"s";
document.body.appendChild(p);
setTimeout(()=>p.remove(),12000);
},1500);
}

/* EXPLOSION */
function explode(x,y){
for(let i=0;i<30;i++){
let e=document.createElement("div");
e.className="explosion";
e.innerHTML="💖";
e.style.left=x+"px";
e.style.top=y+"px";
e.style.setProperty('--x',(Math.random()*300-150)+"px");
e.style.setProperty('--y',(Math.random()*300-150)+"px");
document.body.appendChild(e);
setTimeout(()=>e.remove(),1000);
}
}

/* CLICK RIPPLE */
document.addEventListener("click",(e)=>{
let r=document.createElement("div");
r.className="ripple";
r.style.left=e.clientX+"px";
r.style.top=e.clientY+"px";
r.style.width="20px";
r.style.height="20px";
document.body.appendChild(r);
setTimeout(()=>r.remove(),1000);
});

</script>

</body>
</html>
