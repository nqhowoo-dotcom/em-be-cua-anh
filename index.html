<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thanh Nguyên ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:radial-gradient(circle at center,#0d0d2b 0%,#000 80%);
color:white;
}

/* FADE EFFECT */
.fade{
transition:opacity 1s ease;
}

/* LOCK SCREEN */
#lock{
position:absolute;
width:100%;height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:10;
}

input{
padding:12px;
border-radius:25px;
border:none;
margin-top:15px;
text-align:center;
width:200px;
}

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff2d95;
color:white;
cursor:pointer;
margin-top:15px;
box-shadow:0 0 20px #ff2d95;
}

/* STARS */
.star{
position:absolute;
width:2px;height:2px;
background:white;
border-radius:50%;
opacity:.6;
animation:twinkle 3s infinite alternate;
}
@keyframes twinkle{
from{opacity:.3}
to{opacity:1}
}

/* SHOOTING STAR */
.shooting{
position:absolute;
width:3px;height:3px;
background:white;
box-shadow:0 0 10px white;
animation:shoot 1s linear forwards;
}
@keyframes shoot{
to{transform:translate(400px,400px);opacity:0}
}

/* FLOAT HEART */
.heart{
position:absolute;
font-size:20px;
animation:float 8s linear infinite;
}
@keyframes float{
0%{transform:translateY(100vh);opacity:0}
10%{opacity:1}
90%{opacity:1}
100%{transform:translateY(-10vh);opacity:0}
}

/* MAIN NAME */
#name{
position:absolute;
top:50%;left:50%;
transform:translate(-50%,-50%) scale(.7);
font-size:55px;
text-align:center;
opacity:0;
text-shadow:0 0 15px #ff4da6,0 0 35px #ff1a8c;
animation:glow 2s infinite alternate;
transition:2s ease;
}
@keyframes glow{
from{text-shadow:0 0 10px #ff4da6}
to{text-shadow:0 0 40px #ff1a8c}
}

/* RIPPLE */
.ripple{
position:absolute;
border:2px solid #ff4da6;
border-radius:50%;
animation:ripple 1s ease-out forwards;
}
@keyframes ripple{
to{
transform:scale(5);
opacity:0;
}
}

/* PAGE 2 */
#page2{
position:absolute;
width:100%;height:100%;
background:black;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
text-align:center;
}

.gallery{
display:flex;
overflow-x:auto;
gap:15px;
scroll-snap-type:x mandatory;
width:100%;
max-width:350px;
}

.gallery img{
width:250px;
border-radius:20px;
scroll-snap-align:center;
box-shadow:0 0 20px #ff2d95;
}

</style>
</head>
<body>

<div id="lock">
<h2>Nhập mật khẩu 💖</h2>
<input type="password" id="pass" placeholder="••••••">
<button onclick="openUniverse()">Mở</button>
</div>

<div id="name">
Thanh Nguyên ❤️<br>02/02/2008<br><br>
<button onclick="openPage2()">Bất Ngờ 🎁</button>
</div>

<div id="page2">
<h2>Anh yêu Nguyên nhiều lắm 💖</h2>
<br>
<div class="gallery">
<img src="https://picsum.photos/300/400?1">
<img src="https://picsum.photos/300/400?2">
<img src="https://picsum.photos/300/400?3">
</div>
<br>
<button onclick="back()">Quay lại</button>
</div>

<audio id="music" loop>
<source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>

const PASSWORD="02022008";

function openUniverse(){
if(document.getElementById("pass").value!==PASSWORD){
alert("Sai mật khẩu 😝");
return;
}

document.getElementById("lock").style.opacity="0";
setTimeout(()=>{document.getElementById("lock").style.display="none"},1000);

document.getElementById("music").play();
createStars();
createHearts();
shootingStars();

setTimeout(()=>{
let n=document.getElementById("name");
n.style.opacity="1";
n.style.transform="translate(-50%,-50%) scale(1)";
},4000);
}

/* STARS */
function createStars(){
for(let i=0;i<120;i++){
let s=document.createElement("div");
s.className="star";
s.style.top=Math.random()*window.innerHeight+"px";
s.style.left=Math.random()*window.innerWidth+"px";
document.body.appendChild(s);
}
}

/* HEARTS */
function createHearts(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*window.innerWidth+"px";
h.style.animationDuration=(6+Math.random()*4)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),10000);
},1000);
}

/* SHOOTING STAR */
function shootingStars(){
setInterval(()=>{
let s=document.createElement("div");
s.className="shooting";
s.style.top=Math.random()*window.innerHeight/2+"px";
s.style.left=Math.random()*window.innerWidth/2+"px";
document.body.appendChild(s);
setTimeout(()=>s.remove(),1000);
},4000);
}

/* CLICK EFFECT */
document.addEventListener("click",(e)=>{
let r=document.createElement("div");
r.className="ripple";
r.style.left=e.clientX+"px";
r.style.top=e.clientY+"px";
r.style.width="20px";
r.style.height="20px";
document.body.appendChild(r);
setTimeout(()=>r.remove(),1000);
});

/* PAGE 2 */
function openPage2(){
document.getElementById("page2").style.display="flex";
document.getElementById("name").style.display="none";
}

function back(){
document.getElementById("page2").style.display="none";
document.getElementById("name").style.display="block";
}

</script>

</body>
</html>
